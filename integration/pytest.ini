[pytest]
# Standalone config for the hardware-in-the-loop suite. This is a SEPARATE,
# explicit invocation: `pytest integration/`. The default root `pytest` only
# collects `tests/` (see pyproject.toml testpaths) and never descends here.
testpaths = .
addopts = -ra -p no:cacheprovider
markers =
    hil: requires a live CP/M peer on the bench
    two_port: requires a target with distinct Terminal/Transport ports
    destructive: erases the scratch drive; needs --run-destructive
    visual: widget-tree/look-and-feel assertion, no peer required
    best_effort: hardware/timing-dependent; may end Blocked
    mt: MT-ID + requirement tagging, e.g. @pytest.mark.mt("MT-T03", "FR-081")
