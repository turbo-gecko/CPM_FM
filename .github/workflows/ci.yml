name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install
        run: python -m pip install -e .[dev]

      - name: Lint
        run: |
          ruff check src tests
          ruff format --check src tests

      - name: Test
        run: pytest
