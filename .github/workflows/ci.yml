name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    env:
      # PySide6 needs a platform plugin even when no window is shown; run headless.
      QT_QPA_PLATFORM: offscreen
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install system libraries (Qt headless)
        run: sudo apt-get update && sudo apt-get install -y libegl1

      - name: Install
        run: python -m pip install -e .[dev]

      - name: Lint
        run: |
          ruff check src tests
          ruff format --check src tests

      - name: Check requirement views are in sync
        # Fails if docs/requirements_views/ is stale vs the SRS or code Satisfies:
        # tags. Fix locally with: python tools/traceability_sync/generate_views.py
        run: python tools/traceability_sync/generate_views.py --check

      - name: Test
        run: pytest
