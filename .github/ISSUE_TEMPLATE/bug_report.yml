name: Bug report
description: Report a problem with CP/M File Manager
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug report!

        Before you start, please [search existing issues](https://github.com/turbo-gecko/CPM_FM/issues?q=is%3Aissue)
        to avoid duplicates.

        > **Serial or file-transfer problem?** Please use the
        > **Hardware / serial report** template instead — it captures the extra
        > detail we need.
  - type: checkboxes
    id: preflight
    attributes:
      label: Preflight checklist
      options:
        - label: I have searched existing issues and this is not a duplicate.
          required: true
        - label: I am running the latest available version (or have noted my version below).
          required: false
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear and concise description of the bug.
      placeholder: When I..., the app...
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: Exact steps so we can reproduce the behaviour.
      placeholder: |
        1. Open '...'
        2. Click on '...'
        3. See error
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
      description: What did you expect to happen?
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: cpm-fm version
      description: See Help → About, or src/version.txt.
      placeholder: "2.36.0"
    validations:
      required: true
  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - Windows
        - macOS
        - Linux
        - Other (describe below)
    validations:
      required: true
  - type: input
    id: os-version
    attributes:
      label: OS version
      placeholder: "Windows 11 Pro 24H2 / Ubuntu 24.04 / macOS 14.5"
    validations:
      required: false
  - type: dropdown
    id: install
    attributes:
      label: How did you install cpm-fm?
      options:
        - Prebuilt package (dist/package folder)
        - From source (pip install -e .)
        - Other (describe below)
    validations:
      required: false
  - type: textarea
    id: logs
    attributes:
      label: Console output / logs
      description: >
        Launch with `.venv/Scripts/python.exe -m cpm_fm` to keep a console where
        serial and other errors are printed, and paste any relevant output here.
      render: text
    validations:
      required: false
  - type: textarea
    id: extra
    attributes:
      label: Additional context
      description: Screenshots, config, or anything else that might help.
    validations:
      required: false
