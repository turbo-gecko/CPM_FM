name: Feature request
description: Suggest an idea or enhancement for CP/M File Manager
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting an improvement!

        Please [search existing issues](https://github.com/turbo-gecko/CPM_FM/issues?q=is%3Aissue)
        first — someone may have proposed it already.

        This project maintains a formal requirements specification, so features
        become new or changed requirements. Focus on the **behaviour** you want
        and **why** it matters; a maintainer will help map it into the spec.
  - type: checkboxes
    id: preflight
    attributes:
      label: Preflight checklist
      options:
        - label: I have searched existing issues and this is not a duplicate.
          required: true
  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: What are you trying to do that is hard or impossible today?
      placeholder: I'm always frustrated when...
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: Describe the behaviour you'd like to see.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any alternative approaches or workarounds you've tried or thought about.
    validations:
      required: false
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Mockups, links, target CP/M use case, or anything else relevant.
    validations:
      required: false
