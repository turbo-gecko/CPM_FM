# Local pre-commit hooks that mirror the CI "Lint" and "Check requirement
# views are in sync" steps (.github/workflows/ci.yml), so drift is caught
# before a push instead of failing CI.
#
# Setup (once):   pip install pre-commit && pre-commit install
# Run manually:   pre-commit run --all-files
#
# These use `repo: local` and the tools already installed via `.[dev]`, so
# the hook versions always match what CI and the project pin — no second,
# separately-pinned ruff to drift out of step. Entries invoke the project's
# `.venv\Scripts\python.exe` directly (see AGENTS.md > Commands) rather than a
# bare `ruff`/`python`, which may not be on PATH or may resolve to the wrong
# interpreter on a dev machine — unlike CI, which installs into its own
# throwaway global Python and can use bare commands safely.
#
# The executable itself needs a backslash-separated path on Windows: native
# process creation (unlike a shell) will not resolve a relative forward-slash
# path for the *program being launched* (only for arguments passed to it).
# The `entry` string is doubled (`.venv\\Scripts\\python.exe`) because
# pre-commit tokenizes `entry` with `shlex.split()`, whose POSIX escaping
# rules treat a lone backslash as an escape character and drop it — doubling
# it is what survives that pass as one literal backslash.
repos:
  - repo: local
    hooks:
      - id: ruff-check
        name: ruff check (src tests)
        entry: .venv\\Scripts\\python.exe -m ruff check
        language: system
        types: [python]
        files: ^(src|tests)/
        args: [src, tests]
        pass_filenames: false

      - id: ruff-format
        name: ruff format --check (src tests)
        entry: .venv\\Scripts\\python.exe -m ruff format --check
        language: system
        types: [python]
        files: ^(src|tests)/
        args: [src, tests]
        pass_filenames: false

      - id: requirement-views-fresh
        name: requirement views in sync
        # Fails if docs/requirements_views/ is stale vs the SRS / architecture
        # doc / code Satisfies: tags. Also runs the table-structure validator.
        entry: .venv\\Scripts\\python.exe tools/traceability_sync/generate_views.py --check
        language: system
        pass_filenames: false
        files: ^(src/.*\.py|docs/.*\.md|tools/traceability_sync/.*\.py)$
